services:
  - type: web
    name: todoapi
    runtime: java
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/ToDoAPI.jar
    envVars:
      - key: DB_URL
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASS
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PORT
        value: 8080